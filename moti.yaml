cache_path: proto_modules

deps:
  - github.com/googleapis/googleapis
  - go.redsock.ru/protoc-gen-npm@v0.0.17
generate:
  - inputs:
      - directory: "api/grpc"
    plugins:
      - name: go
        out: internal/api/server/zpotify_api
        opts:
          paths: source_relative
      - name: go-grpc
        out: internal/api/server/zpotify_api
        opts:
          paths: source_relative
      - name: grpc-gateway
        out: internal/api/server/zpotify_api
        opts:
          paths: source_relative
      # Documentation + swagger
      - name: openapiv2
        out: pkg/docs/swaggers
      - name: docs
        out: pkg/docs
        opts:
          paths: source_relative
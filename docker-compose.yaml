services:
  db:
    image: postgres:18
    container_name: zpotify_db
    environment:
      POSTGRES_USER: zpotify
      POSTGRES_PASSWORD:
      POSTGRES_DB: zpotify_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '15432:5432'
    volumes:
      - ./data/pg:/var/lib/postgresql

  nginx:
    image: nginx:1.31.2
    container_name: zpotify_webserver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '8085:8085'
    volumes:
      - ./data/angie:/data/nginx
      - ./angie/conf.d/default.conf:/etc/nginx/nginx.conf:ro

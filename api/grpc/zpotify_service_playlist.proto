syntax = "proto3";

package zpotify_api;

import "google/api/annotations.proto";
import "npm.proto";

import "zpotify_common.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service PlaylistAPI {
  rpc CreatePlaylist(CreatePlaylist.Request) returns (CreatePlaylist.Response) {
    option (google.api.http) = {
      post: "/api/playlist/create",
      body: "*"
    };
  };

  rpc GetPlaylist(GetPlaylist.Request) returns (GetPlaylist.Response) {
    option (google.api.http) = {
      get: "/api/playlist/{uuid}"
    };
  }

  rpc DeleteSong(DeleteSong.Request) returns (DeleteSong.Response) {
    option (google.api.http) = {
      post: "/api/playlist/delete_song",
      body: "*"
    };
  }

  rpc ListSongs(ListSongs.Request) returns (ListSongs.Response) {
    option (google.api.http) = {
      post: "/api/playlist/songs",
      body: "*"
    };
  };

  rpc ChangeSongsOrder(ChangeSongsOrder.Request) returns (ChangeSongsOrder.Response) {
    option (google.api.http) = {
      post: "/api/playlist/songs/order",
      body: "*"
    };
  }

  rpc AddSongToPlaylist(AddSongToPlaylist.Request) returns (AddSongToPlaylist.Response) {
    option (google.api.http) = {
      post: "/api/playlist/add_song",
      body: "*"
    };
  }

  rpc UpdatePlaylist(UpdatePlaylist.Request) returns (UpdatePlaylist.Response) {
    option (google.api.http) = {
      post: "/api/playlist/update",
      body: "*"
    };
  }

  // TODO: Implement
  rpc ListPlaylists(ListPlaylists.Request) returns (ListPlaylists.Response) {
    option (google.api.http) = {
      post: "/api/playlist/list",
      body: "*"
    };
  }
}


message ListSongs {
  message Request {
    Paging paging = 1;

    optional uint64 random_hash = 2;
    // by default returns songs from global queue (last added tracks)
    optional string playlist_uuid = 3;
  }

  message Response {
    repeated SongBase songs = 1;
    uint32 total = 2;
  }
}

message DeleteSong {
  message Request {
    string playlist_uuid = 1;
    int32 song_id = 2;
  }

  message Response {}
}

message CreatePlaylist {
  message Request {
    string name = 1;
    optional string description = 2;
    bool is_public = 3;
    repeated string artist_uuids = 4;
    optional int64 cover_file_id = 5;
    optional int32 year = 6;
    repeated PlaylistChip chips = 7;
  }

  message Response {
    string uuid = 1;
  }
}

message UpdatePlaylist {
  message Request {
    string uuid = 1;
    optional string name = 2;
    optional string description = 3;
    optional bool is_public = 4;
    repeated string artist_uuids = 5;
    optional int64 cover_file_id = 6;
    optional int32 year = 7;
    repeated PlaylistChip chips = 8;
  }

  message Response {}
}


message GetPlaylist {
  message Request {
    string uuid = 1;
  }

  message Response {
    Playlist playlist = 1;
  }
}

message ChangeSongsOrder{
  message Request {
    string playlist_uuid = 1;
    repeated int64 song_ids = 2;
  }
  message Response {}
}

message AddSongToPlaylist {
  message Request {
    string playlist_uuid = 1;
    int32 song_id = 2;
  }
  message Response {}
}

message ListPlaylists {
  message Request {
    Paging paging = 1;
  }

  message Response {
    repeated Playlist playlists = 1;
    uint32 total = 2;
  }
}
syntax = "proto3";

package zpotify_api;

import "npm.proto";

import "zpotify_user.proto";
import "zpotify_user_settings.proto";
import "zpotify_common.proto";
import "google/api/annotations.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service FileMetaAPI {
  rpc ListUploadedFiles(ListUploadedFiles.Request) returns (ListUploadedFiles.Response) {
    option (google.api.http) = {
      post: "/api/file_meta/list"
      body: "*",
    };
  }

  rpc GetFile(GetFile.Request) returns (GetFile.Response) {
    option (google.api.http) = {
      get: "/api/file_meta/{file_id}"
    };
  }
}

message ListUploadedFiles {
  message Request {
    bool temporary_only = 1;
  }

  message Response {
    repeated SongFile files = 1;
  }
}

message GetFile {
  message Request {
    int64 file_id = 1;
  }

  message Response {
    FileInfo file = 1;
  }
}

message FileInfo {
  int64 id = 1;
  string path = 2;
  int64 size_bytes = 3;
  int64 duration_sec = 4;
}

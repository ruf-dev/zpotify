syntax = "proto3";

package zpotify_api;

import "npm.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

message Paging {
  uint64 limit = 1;
  uint64 offset = 2;
}

message ArtistBase {
  string uuid = 1;
  string name = 2;
}

message SongBase {
  int64 id = 1;
  string title = 2;
  repeated ArtistBase artists = 3;
  int32 duration_sec = 4;
  string file_path = 5;
  int64 file_id = 6;
}

message Playlist {
  string uuid = 1;
  string name = 2;
  optional string description = 3;
  bool is_public = 4;
  repeated ArtistBase artists = 5;
  optional int32 song_count = 6;
  optional string cover_file_path = 7;
  optional int32 year = 8;
}

message SongFile {
  int64 id = 1;
  string path = 2;
}
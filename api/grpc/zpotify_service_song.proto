syntax = "proto3";

package zpotify_api;

import "google/api/annotations.proto";
import "npm.proto";
import "zpotify_common.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service SongAPI {
  rpc CreateSong(CreateSong.Request) returns (CreateSong.Response) {
    option (google.api.http) = {
      post: "/api/song/create",
      body: "*"
    };
  };

  rpc BatchCreateSong(BatchCreateSong.Request) returns (BatchCreateSong.Response) {
    option (google.api.http) = {
      post: "/api/song/batch_create",
      body: "*"
    };
  };

  rpc UpdateSong(UpdateSong.Request) returns (UpdateSong.Response) {
    option (google.api.http) = {
      post: "/api/song/update",
      body: "*"
    };
  };

  rpc GetSong(GetSong.Request) returns (GetSong.Response) {
    option (google.api.http) = {
      get: "/api/song/{id}"
    };
  };

  rpc SearchSongs(SearchSongs.Request) returns (SearchSongs.Response) {
    option (google.api.http) = {
      post: "/api/song/search",
      body: "*"
    };
  };
}

message CreateSong {
  message Request {
    string title = 1;
    repeated string artist_uuids = 2;
    int64 file_id = 3;
  }

  message Response {
    int64 id = 1;
  }
}

message BatchCreateSong {
  message Request {
    repeated CreateSong.Request songs = 1;
  }

  message Response {
    repeated int64 ids = 1;
  }
}

message UpdateSong {
  message Request {
    int64 id = 1;
    string title = 2;
    repeated string artist_uuids = 3;
  }

  message Response {}
}

message GetSong {
  message Request {
    int64 id = 1;
  }

  message Response {
    SongBase song = 1;
  }
}

message SearchSongs {
  message Request {
    string query = 1;
    Paging paging = 2;
  }

  message Response {
    repeated SongBase songs = 1;
  }
}

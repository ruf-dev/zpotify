syntax = "proto3";

package zpotify_api;

import "google/api/annotations.proto";
import "npm.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service SongAPI {
  rpc CreateSong(CreateSong.Request) returns (CreateSong.Response) {
    option (google.api.http) = {
      post: "/api/song/create",
      body: "*"
    };
  };

  rpc UpdateSong(UpdateSong.Request) returns (UpdateSong.Response) {
    option (google.api.http) = {
      patch: "/api/song/update",
      body: "*"
    };
  };
}

message CreateSong {
  message Request {
    string title = 1;
    repeated string artist_uuids = 2;
    int64 file_id = 3;
  }

  message Response {
    int64 id = 1;
  }
}

message UpdateSong {
  message Request {
    int64 id = 1;
    string title = 2;
    repeated string artist_uuids = 3;
  }

  message Response {}
}

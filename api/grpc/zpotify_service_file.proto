syntax = "proto3";

package zpotify_api;

import "google/api/annotations.proto";
import "npm.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service FileAPI {
  rpc CreateFile(CreateFile.Request) returns (CreateFile.Response) {
    option (google.api.http) = {
      post: "/api/file/create",
      body: "*"
    };
  };
}

message CreateFile {
  message Request {
    string name = 1;
    optional string content_type = 2;
  }

  message Response {
    string id = 1;
  }
}


syntax = "proto3";
package zpotify_api;

import "npm.proto";
import "google/api/annotations.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service FeatureFlagsAPI {
  rpc GetFeatureFlags(GetFeatureFlags.Request) returns (GetFeatureFlags.Response) {
    option (google.api.http) = {
      get: "/api/feature-flags"
    };
  };
}

enum FeatureFlagId {
  FEATURE_FLAG_ID_UNSPECIFIED      = 0;
  IS_COMMENTS_ON_ALBUM_ENABLED     = 1;
}

message FeatureFlag {
  FeatureFlagId id = 1;
  bool is_enabled  = 2;
  string value     = 3;
}

message GetFeatureFlags {
  message Request  {}
  message Response {
    repeated FeatureFlag flags = 1;
  }
}

syntax = "proto3";

package zpotify_api;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "npm.proto";
import "zpotify_common.proto";

option go_package = "/zpotify_api;zpotify_api";
option (npm_package) = "@zpotify/api";

service ArtistsAPI {
  rpc ListArtist(ListArtist.Request) returns (ListArtist.Response) {
    option (google.api.http) = {
      post: "/api/artists/list"
      body: "*",
    };
  };

}

message ListArtist {
  message Request {
    Paging paging = 1;
    Filters filters = 2;
  }

  message Response {
    repeated ArtistBase artists = 1;
  }

  message Filters {
    optional string search = 1;
  }
}

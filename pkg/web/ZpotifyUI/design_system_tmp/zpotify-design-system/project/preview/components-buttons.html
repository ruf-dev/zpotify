<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { color: #600052; font-size: 10px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Primary button */
  .btn-primary {
    background: #600052; color: #dc6dae; border: none;
    border-radius: 0.25em; width: 96px; height: 40px;
    cursor: pointer; transition: transform 0.2s ease; font-family: 'Comfortaa',sans-serif; font-size: 13px;
  }
  .btn-primary:hover { transform: scale(1.05); }

  /* Pill/auth button */
  .btn-pill {
    background: #2f1542; color: #dc6dae; border: none;
    border-radius: 15em; padding: 0 20px; height: 40px;
    cursor: pointer; transition: transform 0.1s ease-in-out; font-family: 'Comfortaa',sans-serif; font-size: 13px;
    white-space: nowrap;
  }
  .btn-pill:hover { transform: scale(1.05); }

  /* Icon button */
  .btn-icon {
    width: 40px; height: 40px; background: transparent; border: 1px solid #600052;
    border-radius: 0.25em; cursor: pointer; transition: transform 0.2s ease;
    display: flex; align-items: center; justify-content: center; color: #d9007f; font-size: 18px;
  }
  .btn-icon:hover { transform: scale(1.05); }

  /* Disabled */
  .btn-disabled {
    background: #1a1a1a; color: #9f8d98; border: none;
    border-radius: 0.25em; width: 96px; height: 40px;
    cursor: not-allowed; font-family: 'Comfortaa',sans-serif; font-size: 13px;
  }

  /* ZButton (small) */
  .btn-z {
    background: #600052; color: #dc6dae; border: none;
    border-radius: 0.25em; width: 64px; height: 32px;
    cursor: pointer; transition: transform 0.2s ease; font-family: 'Comfortaa',sans-serif; font-size: 11px;
  }
  .btn-z:hover { transform: scale(1.05); }

  .meta { color: #9f8d98; font-size: 9px; margin-top: 4px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style></head><body>
  <div>
    <div class="label">Buttons</div>
    <div class="row">
      <div class="col"><button class="btn-primary">Action</button><div class="meta">Primary</div></div>
      <div class="col"><button class="btn-pill">Password</button><div class="meta">Auth / Pill</div></div>
      <div class="col"><button class="btn-icon">♪</button><div class="meta">Icon Button</div></div>
      <div class="col"><button class="btn-z">Save</button><div class="meta">ZButton (sm)</div></div>
      <div class="col"><button class="btn-disabled" disabled>Disabled</button><div class="meta">Disabled</div></div>
    </div>
  </div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .specimen { background: #0a0a0a; border: 1px solid #600052; border-radius: 10px; padding: 16px; }
  .label { font-size: 9px; color: #600052; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase; }

  .gradient-text {
    font-size: 1.75em; font-weight: 700;
    background: linear-gradient(270deg, #d9007f, #00d95a);
    background-size: 600% 600%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gs 5s ease infinite;
  }
  @keyframes gs {
    0% { background-position: 0 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }

  .glow-text {
    font-size: 1.5em; font-weight: 700; color: #d9007f;
    animation: glow 4s infinite alternate;
  }
  @keyframes glow {
    0% { text-shadow: 0 0 2px #d9007f; }
    50% { text-shadow: 0 0 12px #d9007f; }
    100% { text-shadow: 0 0 2px #d9007f; }
  }

  .weight-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: baseline; }
  .w { color: #dc6dae; }
</style></head><body>
  <div class="specimen">
    <div class="label">Animated Gradient Text</div>
    <div class="gradient-text">Soon, there will be some great music. Keep in touch.</div>
  </div>
  <div class="specimen">
    <div class="label">Playing State Glow</div>
    <div class="glow-text">Midnight Dreams</div>
  </div>
  <div class="specimen">
    <div class="label">Comfortaa Weights</div>
    <div class="weight-row">
      <span class="w" style="font-weight:300;font-size:1.1em">Light</span>
      <span class="w" style="font-weight:400;font-size:1.1em">Regular</span>
      <span class="w" style="font-weight:500;font-size:1.1em">Medium</span>
      <span class="w" style="font-weight:600;font-size:1.1em">SemiBold</span>
      <span class="w" style="font-weight:700;font-size:1.1em">Bold</span>
    </div>
  </div>
</body></html>

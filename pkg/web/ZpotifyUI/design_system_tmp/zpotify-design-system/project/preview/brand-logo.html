<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
  .label { color: #600052; font-size: 9px; font-weight: 700; margin-top: 8px; text-align: center; letter-spacing: 0.08em; text-transform: uppercase; }
  .logo-lg { width: 100px; height: 100px; animation: pulse 2s linear infinite; border-radius: 100px; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(217,0,127,0.7); }
    70%  { box-shadow: 0 0 0 20px rgba(217,0,127,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,0,127,0); }
  }
  .logo-sm { width: 48px; height: 48px; border-radius: 48px; }
  .logo-xs { width: 28px; height: 28px; border-radius: 28px; }
  svg-logo { display: block; }
</style></head><body>
  <div style="text-align:center">
    <img src="../assets/logo.svg" class="logo-lg">
    <div class="label">Large (pulsing)</div>
  </div>
  <div style="text-align:center">
    <img src="../assets/logo.svg" class="logo-sm">
    <div class="label">Medium</div>
  </div>
  <div style="text-align:center">
    <img src="../assets/logo.svg" class="logo-xs">
    <div class="label">Small</div>
  </div>
  <div style="text-align:center">
    <img src="../assets/logo.svg" style="width:80px;height:80px;border-radius:80px;filter:grayscale(1);opacity:0.4">
    <div class="label">Disabled state</div>
  </div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 16px; display: flex; flex-direction: column; gap: 2px; }

  .song {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 8px 6px 8px;
    border-bottom: 1px solid #9a8d90;
    border-radius: 1em; cursor: pointer;
    transition: background 0.125s ease-in-out, border-bottom-color 0.125s;
  }
  .song:hover { background: rgba(119,137,145,0.2); }

  /* Playing: selected tint + pulsing bg */
  .song.playing {
    border-bottom-color: #f5003d;
    background: rgba(245, 0, 61, 0.08);
    animation: rowPulse 3s ease-in-out infinite;
  }
  @keyframes rowPulse {
    0%   { background: rgba(245, 0, 61, 0.06); }
    50%  { background: rgba(245, 0, 61, 0.14); }
    100% { background: rgba(245, 0, 61, 0.06); }
  }

  .titles { flex: 1; min-width: 0; }
  .title { color: #f5003d; font-size: 1.1em; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Playing title: glow pulse */
  .title.playing {
    animation: textGlow 3s ease-in-out infinite;
  }
  @keyframes textGlow {
    0%   { text-shadow: 0 0 2px rgba(245,0,61,0.4); }
    50%  { text-shadow: 0 0 12px rgba(245,0,61,0.9), 0 0 24px rgba(245,0,61,0.3); }
    100% { text-shadow: 0 0 2px rgba(245,0,61,0.4); }
  }

  .artists { color: #d87a8e; font-size: 0.75em; font-weight: 300; margin-top: 2px; }
  .duration { color: #f5003d; font-size: 0.9em; font-weight: 700; flex-shrink: 0; }
  .more { width: 24px; flex-shrink: 0; display: flex; justify-content: center; }
  .dots { color: #9a8d90; font-size: 18px; letter-spacing: -2px; line-height: 1; }

  /* Playing indicator dot */
  .playing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #f5003d; flex-shrink: 0;
    animation: dotPulse 1s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%   { opacity: 1; transform: scale(1); }
    50%  { opacity: 0.4; transform: scale(0.7); }
    100% { opacity: 1; transform: scale(1); }
  }
  .placeholder-dot { width: 7px; flex-shrink: 0; }
</style>
</head><body>
  <!-- Currently playing -->
  <div class="song playing">
    <div class="playing-dot"></div>
    <div class="titles">
      <div class="title playing">Midnight Dreams</div>
      <div class="artists">The Night Owls · Chill Wave</div>
    </div>
    <div class="duration">3:42</div>
    <div class="more"><div class="dots">···</div></div>
  </div>

  <!-- Default -->
  <div class="song">
    <div class="placeholder-dot"></div>
    <div class="titles">
      <div class="title">Electric Pulse</div>
      <div class="artists">Neon Riders</div>
    </div>
    <div class="duration">4:11</div>
    <div class="more"><div class="dots">···</div></div>
  </div>

  <!-- Default -->
  <div class="song">
    <div class="placeholder-dot"></div>
    <div class="titles">
      <div class="title">Quiet Hours</div>
      <div class="artists">Still Frame · Ambient</div>
    </div>
    <div class="duration">5:03</div>
    <div class="more"><div class="dots">···</div></div>
  </div>
</body></html>

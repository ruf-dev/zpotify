<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .section-title { color: #600052; font-size: 10px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

  /* Glow animation */
  .glow-demo {
    width: 64px; height: 64px; background: #d9007f; border-radius: 64px;
    animation: pulse 2s linear infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(217,0,127,0.7); }
    70%  { box-shadow: 0 0 0 15px rgba(217,0,127,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,0,127,0); }
  }

  /* Rotation */
  .spin-demo {
    width: 64px; height: 64px; background: #d9007f; border-radius: 64px;
    animation: spin 3s linear infinite;
    display: flex; align-items: center; justify-content: center;
    color: black; font-size: 24px; font-weight: 700;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scale hover */
  .scale-demo {
    width: 80px; height: 36px; background: #600052; border-radius: 15em;
    display: flex; align-items: center; justify-content: center;
    color: #dc6dae; font-size: 11px; cursor: pointer;
    transition: transform 0.2s ease;
  }
  .scale-demo:hover { transform: scale(1.05); }

  /* Subtle hover bg */
  .hover-bg-demo {
    width: 200px; height: 44px; border-radius: 1em;
    border-bottom: 1px solid #9f8d98;
    display: flex; align-items: center; padding: 0 12px;
    color: #d9007f; cursor: pointer; transition: background 0.125s ease-in-out;
  }
  .hover-bg-demo:hover { background: rgba(119,137,145,0.2); }

  .meta { color: #9f8d98; font-size: 10px; max-width: 120px; }

  .timing-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .timing { background: #0a0a0a; border: 1px solid #310049; border-radius: 8px; padding: 8px 12px; }
  .t-name { color: #dc6dae; font-size: 11px; }
  .t-val { color: #9f8d98; font-size: 9px; margin-top: 2px; }
</style></head><body>
  <div class="section-title">Animations</div>
  <div class="row">
    <div style="text-align:center">
      <div class="glow-demo"></div>
      <div class="meta" style="margin-top:6px">Logo idle pulse glow</div>
    </div>
    <div style="text-align:center">
      <div class="spin-demo">Z</div>
      <div class="meta" style="margin-top:6px">Logo playing rotation</div>
    </div>
    <div style="text-align:center">
      <div class="scale-demo">Button</div>
      <div class="meta" style="margin-top:6px">Hover scale(1.05)</div>
    </div>
    <div style="text-align:center">
      <div class="hover-bg-demo">Song Title</div>
      <div class="meta" style="margin-top:6px">List item hover tint</div>
    </div>
  </div>
  <div class="section-title" style="margin-top:8px">Timing Tokens</div>
  <div class="timing-row">
    <div class="timing"><div class="t-name">--ease-quick</div><div class="t-val">0.125s ease-in-out</div></div>
    <div class="timing"><div class="t-name">--ease-default</div><div class="t-val">0.2s ease</div></div>
    <div class="timing"><div class="t-name">--ease-slow</div><div class="t-val">0.3s ease-in-out</div></div>
  </div>
</body></html>

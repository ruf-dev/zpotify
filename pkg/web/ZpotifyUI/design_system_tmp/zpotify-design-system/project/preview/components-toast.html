<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    border: 1px solid #600052; border-radius: 1em; padding: 12px 16px;
    background: #000; display: flex; flex-direction: column; gap: 4px; position: relative;
  }
  .toast.error { border-color: #c1253d; }
  .toast.warn { border-color: #ffa500; }
  .toast.info { border-color: #e5f4d5; }
  .toast-title { color: #d9007f; font-size: 13px; font-weight: 700; }
  .toast.error .toast-title { color: #c1253d; }
  .toast.warn .toast-title { color: #ffa500; }
  .toast.info .toast-title { color: #e5f4d5; }
  .toast-msg { color: #9f8d98; font-size: 11px; }
  .dismiss { position: absolute; top: 6px; right: 12px; color: #9f8d98; font-size: 18px; cursor: pointer; }
</style></head><body>
  <div class="toast">
    <div class="dismiss">×</div>
    <div class="toast-title">Connected</div>
    <div class="toast-msg">Server connection established.</div>
  </div>
  <div class="toast error">
    <div class="dismiss">×</div>
    <div class="toast-title">Error</div>
    <div class="toast-msg">Failed to load track. Please try again.</div>
  </div>
  <div class="toast warn">
    <div class="dismiss">×</div>
    <div class="toast-title">Warning</div>
    <div class="toast-msg">Audio quality reduced due to slow connection.</div>
  </div>
  <div class="toast info">
    <div class="dismiss">×</div>
    <div class="toast-title">Info</div>
    <div class="toast-msg">Shuffle mode enabled.</div>
  </div>
</body></html>

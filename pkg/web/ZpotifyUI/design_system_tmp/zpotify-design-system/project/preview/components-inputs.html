<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .label { color: #6b0028; font-size: 10px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }

  /* Input */
  .input-wrap { position: relative; width: 220px; height: 44px; }
  .input-wrap input {
    width: 100%; height: 100%; padding: 0.75em 12px;
    background: #3a0018; color: #f5003d; border: 1px solid #999;
    border-radius: 1em; outline: none; font-family: 'Comfortaa', sans-serif; font-size: 13px;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: #c5c4c4; }

  /* Label: no background while resting inside the input */
  .input-wrap .float-label {
    position: absolute;
    top: 50%; left: 12px;
    transform: translateY(-50%);
    color: #999;
    font-size: 13px;
    pointer-events: none;
    transition: all 0.2s ease;
    padding: 0 4px;
    /* No background here — only added when floating */
    background: transparent;
    border-radius: 4px;
  }

  /* Floating state: label sits on top of the border — needs bg to cut through it */
  .input-wrap input:focus ~ .float-label,
  .input-wrap input:not(:placeholder-shown) ~ .float-label {
    top: 0;
    transform: translateY(-50%) scale(0.85);
    color: #f5003d;
    left: 8px;
    background: #000; /* only visible when floating over the border */
  }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 4px 12px; height: 32px; border-radius: 16px;
    background: #3a0018; color: #f5003d; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.125s ease-in-out;
  }
  .chip:hover { background: #4e0020; }
  .chip-label { font-size: 10px; color: #f06080; text-transform: lowercase; display: block; text-align: center; margin-top: 4px; }

  /* MultiSelect */
  .multi {
    background: #3a0018; border: 1px solid #999; border-radius: 1em;
    padding: 8px 12px; width: 220px; min-height: 44px; color: #f5003d; font-size: 13px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .multi-chip { background: #6b0028; color: #f06080; border-radius: 12px; padding: 2px 8px; font-size: 11px; }
</style>
</head><body>

  <div>
    <div class="label">Input Field</div>
    <div class="row">
      <div class="input-wrap">
        <input type="text" placeholder=" " id="i1">
        <label class="float-label" for="i1">Username</label>
      </div>
      <div class="input-wrap">
        <input type="password" placeholder=" " id="i2" value="secret">
        <label class="float-label" for="i2">Password</label>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Chips</div>
    <div class="row">
      <div><div class="chip">Pop</div><div class="chip-label">genre</div></div>
      <div><div class="chip">Rock</div><div class="chip-label">genre</div></div>
      <div><div class="chip">Jazz</div><div class="chip-label">genre</div></div>
    </div>
  </div>

  <div>
    <div class="label">Multi-Select</div>
    <div class="multi">
      <div class="multi-chip">Chill</div>
      <div class="multi-chip">Focus</div>
      <span style="color:#9a8d90;font-size:12px">+ add more</span>
    </div>
  </div>

</body></html>

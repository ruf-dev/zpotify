<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 16px; display: flex; gap: 24px; flex-wrap: wrap; }
  .section { flex: 1; min-width: 200px; }
  .section-title { color: #600052; font-size: 10px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .space-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar { background: #d9007f; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .meta { color: #9f8d98; font-size: 10px; }
  .token { color: #dc6dae; font-size: 9px; }

  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .box { width: 36px; height: 36px; background: #310049; border: 1px solid #600052; flex-shrink: 0; }
  .pill-box { width: 60px; height: 24px; background: #310049; border: 1px solid #600052; flex-shrink: 0; }
</style></head><body>
  <div class="section">
    <div class="section-title">Spacing Scale</div>
    <div class="space-row"><div class="bar" style="width:4px"></div><div><div class="meta">--space-1 · 0.25em</div></div></div>
    <div class="space-row"><div class="bar" style="width:8px"></div><div><div class="meta">--space-2 · 0.5em</div></div></div>
    <div class="space-row"><div class="bar" style="width:12px"></div><div><div class="meta">--space-3 · 0.75em</div></div></div>
    <div class="space-row"><div class="bar" style="width:16px"></div><div><div class="meta">--space-4 · 1em (base)</div></div></div>
    <div class="space-row"><div class="bar" style="width:24px"></div><div><div class="meta">--space-5 · 1.5em</div></div></div>
    <div class="space-row"><div class="bar" style="width:32px"></div><div><div class="meta">--space-6 · 2em</div></div></div>
    <div class="space-row"><div class="bar" style="width:48px"></div><div><div class="meta">--space-8 · 3em</div></div></div>
  </div>
  <div class="section">
    <div class="section-title">Border Radii</div>
    <div class="radius-row"><div class="box" style="border-radius:5px"></div><div><div class="meta">5px — player btn</div></div></div>
    <div class="radius-row"><div class="box" style="border-radius:16px"></div><div><div class="meta">1em — cards, inputs, toasts</div></div></div>
    <div class="radius-row"><div class="pill-box" style="border-radius:240px"></div><div><div class="meta">15em — pill buttons, auth</div></div></div>
    <div class="radius-row"><div class="box" style="border-radius:240px;width:36px;height:36px;background:#d9007f;border:none"></div><div><div class="meta">16em — logo, circle buttons</div></div></div>
  </div>
</body></html>

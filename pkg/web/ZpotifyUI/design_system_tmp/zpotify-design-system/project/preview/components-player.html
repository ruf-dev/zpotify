<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 24px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
  .label { color: #600052; font-size: 10px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; text-align:center; }

  /* Player pill */
  .player-closed {
    width: 64px; height: 64px; background: #B3005E; border-radius: 64px;
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
  }
  .player-open {
    width: 320px; height: 64px; background: #B3005E; border-radius: 64px;
    display: flex; align-items: center; position: relative;
    transition: width 0.3s ease-in-out;
  }

  /* Logo */
  .logo-btn {
    width: 64px; height: 64px; background: #d9007f; border-radius: 64px;
    flex-shrink: 0; position: absolute; left: 0; top: 0;
    animation: pulse 2s linear infinite; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(217,0,127,0.7); }
    70%  { box-shadow: 0 0 0 15px rgba(217,0,127,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,0,127,0); }
  }
  .logo-spin { animation: spin 3s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Controls */
  .controls { position: absolute; right: 8px; top: 0; height: 64px; display: flex; align-items: center; gap: 4px; }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 5px; background: transparent;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.125s ease-in-out;
  }
  .ctrl-btn:hover { transform: scale(1.05); }
  .play-btn { background: #d9007f; width: 44px; height: 44px; border-radius: 5px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.25s ease; }
  .play-btn:hover { transform: scale(1.05); }
  .tri { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 16px solid black; margin-left: 3px; }
  .pause-lines { display: flex; gap: 4px; }
  .stick { width: 5px; height: 20px; background: black; border-radius: 2px; }

  /* Progress bar */
  .progress {
    position: absolute; left: 0; bottom: -18px; width: 100%;
    height: 8px; background: #d9007f; border-radius: 8px;
  }
  .progress-fill { width: 40%; height: 100%; background: rgba(0,0,0,0.4); border-radius: 8px 0 0 8px; }
</style></head><body>
  <div class="label">Player — Closed (idle)</div>
  <div class="player-closed">
    <div class="logo-btn">
      <svg width="40" height="40" viewBox="0 0 914 914" fill="none"><circle cx="457" cy="457" r="457" fill="#d9007f"/><path d="M730.7 429.9C586.8 337.6 341.4 319.8 199.7 358.6C177.3 364.6 153 346.7 147.9 329.2C141.7 306.9 157.6 281.1 177.3 277.2C342 234.7 610.4 253.2 776.9 360.4C803 376.5 803 400.4 790.8 420.6C778.8 436.3 751 442.1 730.7 429.9Z" fill="black"/><path d="M781.9 401.6C598.3 432.6 421.5 507.6 317.9 621.2C293.7 647.3 255.4 628.6 268 623.2C387.4 444.1 581.5 361.6 750.6 366.1C783.8 365.1 783.8 381.7 781.9 401.6Z" fill="black"/><path d="M731.7 680.4C589.5 619.1 457.2 600.9 298.4 631.4C265.4 638.5 254 607.2 286.8 577C459.2 544.7 607.2 565.7 721.7 641.8C749.2 659.7 739.2 683.9 731.7 680.4Z" fill="black"/></svg>
    </div>
  </div>

  <div class="label">Player — Open (playing)</div>
  <div class="player-open">
    <div class="logo-btn logo-spin">
      <svg width="40" height="40" viewBox="0 0 914 914" fill="none"><circle cx="457" cy="457" r="457" fill="#d9007f"/><path d="M730.7 429.9C586.8 337.6 341.4 319.8 199.7 358.6C177.3 364.6 153 346.7 147.9 329.2C141.7 306.9 157.6 281.1 177.3 277.2C342 234.7 610.4 253.2 776.9 360.4C803 376.5 803 400.4 790.8 420.6C778.8 436.3 751 442.1 730.7 429.9Z" fill="black"/><path d="M781.9 401.6C598.3 432.6 421.5 507.6 317.9 621.2C293.7 647.3 255.4 628.6 268 623.2C387.4 444.1 581.5 361.6 750.6 366.1C783.8 365.1 783.8 381.7 781.9 401.6Z" fill="black"/><path d="M731.7 680.4C589.5 619.1 457.2 600.9 298.4 631.4C265.4 638.5 254 607.2 286.8 577C459.2 544.7 607.2 565.7 721.7 641.8C749.2 659.7 739.2 683.9 731.7 680.4Z" fill="black"/></svg>
    </div>
    <div class="controls">
      <div class="ctrl-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d9007f" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></div>

      <div class="play-btn"><div class="pause-lines"><div class="stick"></div><div class="stick"></div></div></div>
      <div class="ctrl-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="#d9007f"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="#d9007f" stroke-width="2"/></svg></div>
      <div class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9f8d98" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div>
    </div>
    <div class="progress"><div class="progress-fill"></div></div>
  </div>
</body></html>

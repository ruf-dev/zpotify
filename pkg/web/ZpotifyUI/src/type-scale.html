<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Comfortaa', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid #111; }
  .meta { width: 100px; flex-shrink: 0; }
  .meta-name { color: #600052; font-size: 10px; font-weight: 700; }
  .meta-size { color: #9f8d98; font-size: 9px; margin-top: 2px; }
  .sample { color: #d9007f; }
</style></head><body>
  <div class="row"><div class="meta"><div class="meta-name">Display</div><div class="meta-size">2.5em · 700</div></div><div class="sample" style="font-size:2.5em;font-weight:700;line-height:1.1">Zpotify</div></div>
  <div class="row"><div class="meta"><div class="meta-name">H1</div><div class="meta-size">2em · 700</div></div><div class="sample" style="font-size:2em;font-weight:700;line-height:1.2">Now Playing</div></div>
  <div class="row"><div class="meta"><div class="meta-name">H2</div><div class="meta-size">1.5em · 600</div></div><div class="sample" style="font-size:1.5em;font-weight:600;line-height:1.3">My Playlists</div></div>
  <div class="row"><div class="meta"><div class="meta-name">Body</div><div class="meta-size">1em · 400</div></div><div class="sample" style="font-size:1em;font-weight:400;color:#dc6dae;line-height:1.6">Soon, there will be some great music. Keep in touch.</div></div>
  <div class="row"><div class="meta"><div class="meta-name">Label</div><div class="meta-size">0.875em · 500</div></div><div class="sample" style="font-size:0.875em;font-weight:500;color:#dc6dae">Track title · Artist name</div></div>
  <div class="row"><div class="meta"><div class="meta-name">Caption</div><div class="meta-size">0.75em · 400</div></div><div class="sample" style="font-size:0.75em;font-weight:400;color:#d186b2;text-transform:lowercase">3:42 · album</div></div>
</body></html>

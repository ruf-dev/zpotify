<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zpotify — Multitrack Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── Responsive root ─────────────────────────────────────── */
:root { font-size: 16px; }
@media (max-width: 480px)                          { :root { font-size: 12px; } }
@media (min-width: 481px)  and (max-width: 767px)  { :root { font-size: 13px; } }
@media (min-width: 768px)  and (max-width: 1023px) { :root { font-size: 14px; } }
@media (min-width: 1024px) and (max-width: 1439px) { :root { font-size: 16px; } }
@media (min-width: 1440px) and (max-width: 1919px) { :root { font-size: 17px; } }
@media (min-width: 1920px)                         { :root { font-size: 19px; } }

:root {
  --pink:         #d9007f;
  --pink-glow:    rgba(217,0,127,0.35);
  --pink-dim:     rgba(217,0,127,0.12);
  --pink-border:  rgba(217,0,127,0.30);
  --pink-shadow:  rgba(217,0,127,0.20);

  --bg-base:      #000;
  --bg-card:      #0d0d0d;
  --bg-elevated:  #141414;
  --bg-hover:     rgba(255,255,255,0.04);
  --bg-hover-mid: rgba(255,255,255,0.07);

  --border-dim:    rgba(255,255,255,0.06);
  --border-mid:    rgba(255,255,255,0.11);
  --border-bright: rgba(255,255,255,0.22);

  --text-primary:   rgba(255,255,255,0.88);
  --text-secondary: rgba(255,255,255,0.50);
  --text-muted:     rgba(255,255,255,0.25);
  --text-disabled:  rgba(255,255,255,0.15);

  --color-error: #c1253d;

  --header-h:      3.5rem;

  --radius-sm:     0.5em;
  --radius-md:     0.875em;
  --radius-lg:     1.1em;
  --radius-pill:   15em;
  --radius-circle: 50%;

  --ease-snap: cubic-bezier(0.4,0,0.2,1);
  --dur-fast:  0.15s;
  --dur-mid:   0.22s;
  --dur-slow:  0.34s;

  --font:     'Comfortaa', sans-serif;
  --text-xs:  0.625rem;
  --text-sm:  0.6875rem;
  --text-base:0.75rem;
  --text-md:  0.8125rem;
  --text-lg:  0.875rem;
  --text-xl:  0.9375rem;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; height: 100%; background: var(--bg-base); font-family: var(--font); color: var(--text-primary); overflow: hidden; }
::-webkit-scrollbar { width: 0; height: 0; }
* { scrollbar-width: none; }

/* keyframes */
@keyframes logoPulse {
  0%  { filter: drop-shadow(0 0 0 rgba(217,0,127,.9)); }
  60% { filter: drop-shadow(0 0 1.1rem rgba(217,0,127,0)); }
  100%{ filter: drop-shadow(0 0 0 rgba(217,0,127,.9)); }
}
@keyframes modalOverlayIn { from{opacity:0} to{opacity:1} }
@keyframes modalPanelIn   { from{opacity:0;transform:scale(0.96) translateY(10px)} to{opacity:1;transform:none} }
@keyframes fadeUp         { from{opacity:0;transform:translateY(0.625rem)} to{opacity:1;transform:none} }
@keyframes pillPop        { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes checkIn        { from{stroke-dashoffset:20} to{stroke-dashoffset:0} }
@keyframes glowFade       { 0%,100%{opacity:.35} 50%{opacity:.55} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="multitrack/parts.jsx"></script>
<script type="text/babel" src="multitrack/modal.jsx"></script>
<script type="text/babel" src="multitrack/tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════════════
   Mock data — preloaded "dropped files"
   ═══════════════════════════════════════════════════════════ */
const ALL_ARTISTS = [
  'Mirror Lake', 'Neon Riders', 'The Night Owls', 'Still Frame',
  'Rain Protocol', 'Cortex Blue', 'Deep Signal', 'The Noise Floor',
  'Digital Horizons', 'Lo-fi Saints', 'Glass Cities', 'Phosphene',
  'Static Field', 'Aurora Drift', 'Velvet Index'
];

const SAMPLE_TRACKS_FULL = [
  { id: 't1', title: 'opening sequence',    artists: ['Mirror Lake'],                  duration: 191, size: 5_320_000 },
  { id: 't2', title: 'glass cathedral',     artists: [],                               duration: 246, size: 6_810_000 },
  { id: 't3', title: 'undertow',            artists: ['Deep Signal'],                  duration: 319, size: 8_400_000 },
  { id: 't4', title: 'haze protocol',       artists: [],                               duration: 217, size: 5_900_000 },
  { id: 't5', title: 'midnight broadcast',  artists: ['Mirror Lake', 'Cortex Blue'],   duration: 284, size: 7_650_000 },
  { id: 't6', title: 'binary sunset',       artists: [],                               duration: 267, size: 7_120_000 },
  { id: 't7', title: 'soft static',         artists: ['The Noise Floor'],              duration: 362, size: 9_800_000 },
  { id: 't8', title: 'cascade',             artists: [],                               duration: 231, size: 6_220_000 },
  { id: 't9', title: 'closing credits',     artists: ['Mirror Lake'],                  duration: 158, size: 4_410_000 },
];

const SAMPLE_COVER_DATA_URL = makeSampleCover();

function makeSampleCover() {
  // Stripey monospace placeholder cover — not a hand-drawn vector illustration.
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
    <defs>
      <pattern id='s' width='8' height='8' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'>
        <rect width='4' height='8' fill='%23ffffff' opacity='0.06'/>
      </pattern>
      <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
        <stop offset='0' stop-color='%231a0e22'/>
        <stop offset='1' stop-color='%232a0820'/>
      </linearGradient>
    </defs>
    <rect width='200' height='200' fill='url(%23g)'/>
    <rect width='200' height='200' fill='url(%23s)'/>
    <text x='100' y='106' text-anchor='middle' fill='%23ffffff66'
      font-family='monospace' font-size='11' letter-spacing='1'>COVER ART</text>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + svg
    .replace(/\n\s+/g, '')
    .replace(/#/g, '%23')
    .replace(/"/g, "'");
}

/* ═══════════════════════════════════════════════════════════
   Backdrop — minimal hint of the home app behind the modal
   ═══════════════════════════════════════════════════════════ */
function Backdrop() {
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 1, overflow: 'hidden',
      background: 'radial-gradient(ellipse at 50% 30%, #0a0008 0%, #000 70%)'
    }}>
      {/* Header strip hint */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, height: 'var(--header-h)',
        borderBottom: '1px solid var(--border-dim)',
        display: 'flex', alignItems: 'center', padding: '0 1.5rem', gap: '0.625rem',
        opacity: 0.55
      }}>
        <ZLogo size={28} pulsing/>
        <span style={{ fontSize: 'var(--text-xl)', fontWeight: 700, color: 'var(--text-primary)',
          letterSpacing: '-0.01em' }}>zpotify</span>
        <div style={{ flex: 1 }}/>
        <div style={{ width: '6.5rem', height: '1.5rem', borderRadius: 'var(--radius-pill)',
          background: 'var(--bg-elevated)', border: '1px solid var(--border-dim)' }}/>
      </div>

      {/* Faint carousel-card hint */}
      <div style={{ position: 'absolute', top: '7rem', left: '50%',
        transform: 'translateX(-50%)', width: '70vw', maxWidth: '30rem', height: '60vh',
        border: '1px solid var(--border-dim)', borderRadius: 'var(--radius-lg)',
        background: 'var(--bg-card)', opacity: 0.5 }}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   Tweak defaults & App
   ═══════════════════════════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "trackCount": 9,
  "playlistMode": false,
  "coverState": "default"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [allArtists, setAllArtists] = useState(ALL_ARTISTS);

  // Derived: tracks list from tweak count
  const tracks = useMemo(
    () => SAMPLE_TRACKS_FULL.slice(0, t.trackCount).map(x => ({ ...x })),
    [t.trackCount]
  );

  const coverSrc = t.coverState === 'uploaded' ? SAMPLE_COVER_DATA_URL : null;

  const [submittedToast, setSubmittedToast] = useState(null);

  const handleCreateArtist = (name) => {
    setAllArtists(a => a.includes(name) ? a : [name, ...a]);
  };

  const handleSubmit = (payload) => {
    setSubmittedToast({
      title: payload.playlistMode
        ? `created "${payload.playlistName}"`
        : `uploaded ${payload.tracks.length} track${payload.tracks.length === 1 ? '' : 's'}`,
      sub: `${payload.tracks.length} track${payload.tracks.length === 1 ? '' : 's'}` +
        (payload.albumArtists?.length ? ` · ${payload.albumArtists.join(', ')}` : '')
    });
    setTimeout(() => setSubmittedToast(null), 3500);
  };

  return (
    <div style={{ width: '100vw', height: '100vh', overflow: 'hidden', position: 'relative' }}>
      <Backdrop/>
      <MultitrackModal
        initialTracks={tracks}
        initialPlaylist={t.playlistMode ? '' : ''}
        initialCoverSrc={coverSrc}
        isPlaylistMode={t.playlistMode}
        setPlaylistMode={(v) => setTweak('playlistMode', v)}
        allArtists={allArtists}
        onCreateArtist={handleCreateArtist}
        onClose={() => {/* prototype: keep modal open */}}
        onSubmit={handleSubmit}/>

      {/* Submit toast */}
      {submittedToast && (
        <div style={{
          position: 'fixed', bottom: '1.5rem', left: '50%',
          transform: 'translateX(-50%)', zIndex: 700,
          background: 'var(--bg-elevated)', border: '1px solid var(--pink-border)',
          borderRadius: 'var(--radius-md)',
          padding: '0.75rem 1rem 0.75rem 0.75rem',
          boxShadow: '0 12px 36px rgba(0,0,0,0.7), 0 0 24px var(--pink-shadow)',
          animation: 'fadeUp 0.3s var(--ease-snap) both',
          display: 'flex', alignItems: 'center', gap: '0.625rem',
          minWidth: '15rem'
        }}>
          <div style={{ width: '1.875rem', height: '1.875rem', borderRadius: '50%',
            background: 'var(--pink)', display: 'flex', alignItems: 'center',
            justifyContent: 'center', flexShrink: 0 }}>
            <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round">
              <polyline points="2 6 5 9 10 3"/>
            </svg>
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 'var(--text-md)', fontWeight: 700, color: 'var(--text-primary)' }}>
              {submittedToast.title}
            </div>
            <div style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)', marginTop: '0.125rem' }}>
              {submittedToast.sub}
            </div>
          </div>
        </div>
      )}

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection label="Demo state"/>
        <TweakRadio label="Tracks" value={t.trackCount}
          options={[1, 3, 5, 9]}
          onChange={(v) => setTweak('trackCount', v)}/>
        <TweakToggle label="Playlist mode" value={t.playlistMode}
          onChange={(v) => setTweak('playlistMode', v)}/>
        <TweakRadio label="Cover" value={t.coverState}
          options={['default', 'uploaded']}
          onChange={(v) => setTweak('coverState', v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

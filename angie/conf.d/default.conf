worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;

    types {
        # Audio
        audio/mpeg          mp3;
        audio/ogg           ogg oga;
        audio/wav           wav;
        audio/flac          flac;
        audio/aac           aac;
        audio/webm          weba;
        audio/x-m4a         m4a;

        # Images
        image/jpeg          jpg jpeg;
        image/png           png;
        image/webp          webp;
        image/gif           gif;
        image/svg+xml       svg svgz;

        # Binary / archives (force download)
        application/octet-stream    bin exe dll so a o img iso;
        application/zip             zip;
        application/gzip            gz tgz;
        application/x-tar           tar;
        application/x-bzip2         bz2;
        application/x-7z-compressed 7z;
        application/x-rar-compressed rar;
    }

    sendfile on;

    server {
        listen      8085;
        server_name localhost;

        root /data/nginx;

        autoindex on;
        autoindex_exact_size on;
        autoindex_localtime  on;

        # Audio files – inline playback + range requests for seeking
        location ~* \.(mp3|ogg|oga|wav|flac|aac|weba|m4a)$ {
            add_header Accept-Ranges bytes;
            add_header Cache-Control "no-cache";
            # Allow future React app / browser to reach this from any origin
#             add_header Access-Control-Allow-Origin *;
        }

#         Image files – served from file storage root
        location ~* \.(jpg|jpeg|png|webp|gif)$ {
            add_header Cache-Control "public, max-age=86400";
        }

        location /wapi/ {
            client_max_body_size 200m;
            proxy_request_buffering off;

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;

            proxy_pass http://host.docker.internal:8087;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;
        }

        location /api {

#             if ($request_method = 'OPTIONS') {
#                 add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
#                 add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Grpc-Web, X-User-Agent, Grpc-Metadata-Authorization';
#                 add_header Content-Length 0;
#                 return 204;
#             }

            proxy_pass http://host.docker.internal:8087;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_request_headers on;

#             add_header Access-Control-Allow-Origin *;
        }

        # Everything else – force download
        location / {
            proxy_pass http://host.docker.internal:5173;
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
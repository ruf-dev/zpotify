worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;

    types {
        # Audio
        audio/mpeg          mp3;
        audio/ogg           ogg oga;
        audio/wav           wav;
        audio/flac          flac;
        audio/aac           aac;
        audio/webm          weba;
        audio/x-m4a         m4a;

        # Binary / archives (force download)
        application/octet-stream    bin exe dll so a o img iso;
        application/zip             zip;
        application/gzip            gz tgz;
        application/x-tar           tar;
        application/x-bzip2         bz2;
        application/x-7z-compressed 7z;
        application/x-rar-compressed rar;
    }

    sendfile on;

    server {
        listen      8085;
        server_name localhost;

        root /data/nginx;

        autoindex on;
        autoindex_exact_size on;
        autoindex_localtime  on;

        # Audio files – inline playback + range requests for seeking
        location ~* \.(mp3|ogg|oga|wav|flac|aac|weba|m4a)$ {
            add_header Accept-Ranges bytes;
            add_header Cache-Control "no-cache";
            # Allow future React app / browser to reach this from any origin
            add_header Access-Control-Allow-Origin *;
        }

        # Everything else – force download
        location / {
            add_header Content-Disposition 'attachment';
            add_header Accept-Ranges bytes;
            try_files $uri $uri/ =404;
        }
    }
}
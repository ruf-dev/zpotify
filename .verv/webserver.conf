default_type application/octet-stream;

types {
    # Audio
    audio/mpeg          mp3;
    audio/ogg           ogg oga;
    audio/wav           wav;
    audio/flac          flac;
    audio/aac           aac;
    audio/webm          weba;
    audio/x-m4a         m4a;

    # Binary / archives (force download)
    application/octet-stream    bin exe dll so a o img iso;
    application/zip             zip;
    application/gzip            gz tgz;
    application/x-tar           tar;
    application/x-bzip2         bz2;
    application/x-7z-compressed 7z;
    application/x-rar-compressed rar;
}
sendfile on;

server {
    listen 443 ssl http2;

    server_name zpotify.ru;

    autoindex on;
    autoindex_exact_size on;
    autoindex_localtime  on;

    ssl_certificate /etc/angie/ssl/live/zpotify.ru/fullchain.pem;
    ssl_certificate_key /etc/angie/ssl/live/zpotify.ru/privkey.pem;
    ssl_trusted_certificate /etc/angie/ssl/live/zpotify.ru/chain.pem;

#    Media content proxied to nginx on SC
    location ~* \.(mp3|ogg|oga|wav|flac|aac|weba|m4a)$ {
        proxy_pass http://100.64.0.35:8085;
    }

    # Everything else – force download
    location / {
         client_max_body_size 200m;
         proxy_request_buffering off;

         proxy_read_timeout  300s;
         proxy_send_timeout  300s;

         proxy_pass http://zpotify-api;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Port $server_port;

         proxy_set_header X-Original-Method $request_method;
         proxy_set_header X-Request-Method $request_method;
    }

    location /api {
        proxy_pass http://zpotify-api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_request_headers on;
    }

    location /wapi/ {
        client_max_body_size 200m;
        proxy_request_buffering off;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        proxy_pass http://zpotify-api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }
}


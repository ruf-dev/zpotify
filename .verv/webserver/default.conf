worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'

        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"domain":"$host",'

        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'

        '"headers":{'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer",'
            '"content_type":"$http_content_type",'
            '"content_length":"$http_content_length",'
            '"authorization":"$http_authorization",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_real_ip":"$http_x_real_ip",'
            '"accept":"$http_accept",'
            '"accept_encoding":"$http_accept_encoding",'
            '"cookie":"$http_cookie"'
        '},'

        '"request_body":"$request_body",'

        '"upstream":{'
            '"addr":"$upstream_addr",'
            '"response_time":"$upstream_response_time",'
            '"status":"$upstream_status"'
        '}'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    default_type application/octet-stream;

    types {
        # Audio
        audio/mpeg          mp3;
        audio/ogg           ogg oga;
        audio/wav           wav;
        audio/flac          flac;
        audio/aac           aac;
        audio/webm          weba;
        audio/x-m4a         m4a;

        # Binary / archives (force download)
        application/octet-stream    bin exe dll so a o img iso;
        application/zip             zip;
        application/gzip            gz tgz;
        application/x-tar           tar;
        application/x-bzip2         bz2;
        application/x-7z-compressed 7z;
        application/x-rar-compressed rar;
    }

    sendfile on;

    server {
        listen      8085;
        server_name localhost;

        root /data/nginx;

        autoindex on;
        autoindex_exact_size on;
        autoindex_localtime  on;

        # Audio files – inline playback + range requests for seeking
        location ~* \.(mp3|ogg|oga|wav|flac|aac|weba|m4a)$ {
            add_header Accept-Ranges bytes;
            add_header Cache-Control "no-cache";
            # Allow future React app / browser to reach this from any origin
#             add_header Access-Control-Allow-Origin *;
        }
    }
}